name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps chromium

      - run: python scripts/fetch_fantasy_cricket.py
        env:
          FANTASY_USERNAME: ${{ secrets.FANTASY_USERNAME }}
          FANTASY_PASSWORD: ${{ secrets.FANTASY_PASSWORD }}

      - run: python scripts/fetch_play_cricket.py
        env:
          PLAY_CRICKET_API_TOKEN: ${{ secrets.PLAY_CRICKET_API_TOKEN }}
          PLAY_CRICKET_SITE_ID: ${{ secrets.PLAY_CRICKET_SITE_ID }}

      - run: python scripts/fetch_player_stats.py
        env:
          PLAY_CRICKET_API_TOKEN: ${{ secrets.PLAY_CRICKET_API_TOKEN }}
          PLAY_CRICKET_SITE_ID: ${{ secrets.PLAY_CRICKET_SITE_ID }}

      - run: python scripts/fetch_fixtures.py
        env:
          PLAY_CRICKET_API_TOKEN: ${{ secrets.PLAY_CRICKET_API_TOKEN }}
          PLAY_CRICKET_SITE_ID: ${{ secrets.PLAY_CRICKET_SITE_ID }}

      - run: python scripts/fetch_cs365_training.py
        env:
          CS365_USERNAME: ${{ secrets.CS365_USERNAME }}
          CS365_PASSWORD: ${{ secrets.CS365_PASSWORD }}

      - run: python scripts/fetch_youtube_live.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Cache downloaded video clips
        uses: actions/cache@v4
        with:
          path: content/data/fetched/videos
          key: videos-${{ hashFiles('content/slides/*.json') }}
          restore-keys: |
            videos-

      - run: python scripts/fetch_videos.py

      - run: python scripts/build.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
