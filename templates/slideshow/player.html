<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ show.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        iframe.active { opacity: 1; }

        body.debug iframe {
            width: 50%; height: 50%;
            left: auto; right: 0;
        }
        #dbg {
            display: none;
            position: fixed;
            left: 0; top: 0;
            width: 50%; height: 100%;
            overflow-y: auto;
            background: #0d0d0d;
            border-right: 1px solid #2a2a2a;
            padding: 14px 16px;
            font: 12px/1.6 monospace;
            color: #ccc;
        }
        body.debug #dbg { display: block; }
        .dbg-head { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .08em; margin: 12px 0 3px; }
        .dbg-head:first-child { margin-top: 0; }
        .dbg-val { color: #fff; }
        .slide-row { padding: 1px 4px; margin: 0 -4px; border-radius: 2px; }
        .slide-row.on  { color: #66bb6a; }
        .slide-row.off { color: #444; }
        .slide-row.now { background: #1b2e1b; color: #a5d6a7; }
        .slide-reason  { font-size: 11px; color: #e65100; padding-left: 14px; }
        .dbg-dim { color: #555; font-size: 11px; }
        .dbg-note { color: #555; font-style: italic; }
    </style>
</head>
<body>
    <div id="dbg"></div>
    {% for slide in show.slides %}
    <iframe id="frame-{{ loop.index0 }}" src="/slide/{{ slide.slug }}/"></iframe>
    {% endfor %}

    <script>
        const DEBUG = new URLSearchParams(window.location.search).has('debug');
        if (DEBUG) document.body.classList.add('debug');

        const today = new Date().toISOString().slice(0, 10);
        const allSlides = {{ show.slides | tojson }}.map((s, i) => {
            const reason = (s.expires && s.expires < today) ? `expired ${s.expires}` : null;
            return { ...s, _i: i, _shown: !reason, _reason: reason };
        });
        const slides = allSlides.filter(s => s._shown);

        let current = 0;

        function showSlide(index) {
            document.querySelectorAll('iframe').forEach((f, i) => {
                f.classList.toggle('active', i === slides[index]._i);
            });
            if (DEBUG) markCurrentSlide(index);
        }

        function advance() {
            current = (current + 1) % slides.length;
            showSlide(current);
            setTimeout(advance, slides[current].duration * 1000);
        }

        function markCurrentSlide(idx) {
            document.querySelectorAll('#dbg-slides .slide-row').forEach(el => el.classList.remove('now'));
            document.querySelector(`#dbg-slides .slide-row[data-idx="${slides[idx]._i}"]`)?.classList.add('now');
        }

        function renderPanel() {
            const panel = document.getElementById('dbg');
            if (!panel) return;
            const rows = allSlides.map(s => {
                const cls = s._shown ? 'on' : 'off';
                const expires = s.expires ? ` <span class="dbg-dim">exp ${s.expires}</span>` : '';
                const reason = s._reason ? `<div class="slide-reason">↳ ${s._reason}</div>` : '';
                return `<div class="slide-row ${cls}" data-idx="${s._i}">${s._shown ? '●' : '○'} ${s.slug} <span class="dbg-dim">${s.duration}s</span>${expires}${reason}</div>`;
            }).join('');
            panel.innerHTML = [
                `<div class="dbg-head">Slideshow</div><div class="dbg-val">{{ show.title }}</div>`,
                `<div class="dbg-head">Slides</div><div id="dbg-slides">${rows}</div>`,
                `<div class="dbg-head">Context filtering</div><div class="dbg-note">n/a — use /screen/… for context-aware playback</div>`,
            ].join('');
        }

        if (DEBUG) renderPanel();

        if (slides.length > 0) {
            showSlide(0);
            setTimeout(advance, slides[0].duration * 1000);
        }

        // Reload the player every 6 hours to pick up weekly updates
        setTimeout(() => location.reload(), 6 * 60 * 60 * 1000);
    </script>
</body>
</html>
