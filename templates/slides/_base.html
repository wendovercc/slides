<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock %}</title>
    <style>
        /* WCC brand typeface — self-hosted Lato (OFL), offline-safe for the kiosk */
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 400; font-display: swap; src: url('/assets/fonts/lato-latin-400-normal.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: italic; font-weight: 400; font-display: swap; src: url('/assets/fonts/lato-latin-400-italic.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 700; font-display: swap; src: url('/assets/fonts/lato-latin-700-normal.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 900; font-display: swap; src: url('/assets/fonts/lato-latin-900-normal.woff2') format('woff2'); }
        :root {
            /* WCC brand palette */
            --navy-1:       #0f2346;
            --navy-2:       #0a1c3a;
            --gold:         #d4af37;
            --light-blue:   #b4c8e4;
            --bg:           linear-gradient(165deg, var(--navy-1) 0%, var(--navy-2) 100%);
            --text:         #ffffff;
            --muted:        var(--light-blue);   /* secondary labels — prefer over opacity-white */
            --accent:       var(--gold);         /* single decorative accent: rules, headline metric, active tab */
            /* Result semantics (kept green/red/blue — these signal outcomes, not brand) */
            --accent-win:   #2d7a2d;
            --accent-loss:  #8b1a1a;
            --accent-amber: #7a5c00;
            --accent-draw:  #1a5c7a;
            --safe-x:       5vw;
            --safe-y:       5vh;
            --footer-h:     8vh;
            --t-xl:         4vw;
            --t-lg:         2.8vw;
            --t-md:         2vw;
            --t-sm:         1.2vw;
            --t-xs:         0.9vw;
            --t-xxs:        0.7vw;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        html, body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg);
            font-family: 'Lato', -apple-system, Arial, sans-serif;
            color: var(--text);
        }
        .slide {
            width: 100vw;
            height: calc(100vh - var(--footer-h));
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: var(--safe-y) var(--safe-x);
        }
        .footer-strip {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--footer-h);
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            padding: 0 var(--safe-x);
            gap: 2vw;
        }
        .club-logo {
            height: calc(var(--footer-h) * 0.72);
            width: auto;
            object-fit: contain;
        }
        .club-meta { display: flex; flex-direction: column; gap: 0.3vh; }
        .club-name {
            font-family: 'Lato', Arial, sans-serif;
            font-size: var(--t-xxs);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.8;
            white-space: nowrap;
        }
        .club-watch {
            font-family: 'Lato', Arial, sans-serif;
            font-size: var(--t-xxs);
            color: var(--muted);
            white-space: nowrap;
        }
        .club-watch strong { color: var(--accent); font-weight: 700; }
        /* Sponsor block sits at the right end of the strip: a gold support
           heading beside the uniform banner row. */
        .sponsor-block {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1vw;
            min-width: 0;
        }
        .sponsor-heading {
            font-family: 'Lato', Arial, sans-serif;
            font-size: var(--t-xxs);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            text-align: right;
            line-height: 1.25;
            max-width: 7vw;
            flex-shrink: 0;
        }
        .sponsor-logos {
            display: flex;
            gap: 0.8vw;
            align-items: center;
            min-width: 0;
        }
        .sponsor-logo {
            /* Uniform 800x150 (16:3) banner tile, matching the sidebar. The white
               backing shows only behind transparent logos; cover (not contain)
               fills the tile edge-to-edge so no white letterbox slivers appear
               around the artwork and the hairline border stays clean. */
            height: calc(var(--footer-h) * 0.52);
            aspect-ratio: 16 / 3;
            width: auto;
            object-fit: cover;
            background: #fff;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.12);
        }
        /* Interactive pause: freeze the active tab's gold underline at full width */
        body.paused .panel-tab.active::after { animation: none; transform: scaleX(1); }
        /* Tab progress fill is turned off for now: the active tab reads as fully
           underlined from the start (the same look as the paused state), and the
           countdown moves to the interactive control bar rather than the wall.
           Kept as a single specificity-winning override so the per-slide
           `panel-progress` animations and @keyframes stay intact — delete these
           two rules to bring the filling underline back. */
        body .panel-tab.active::after,
        body .set-nav .panel-tab.active::after { animation: none; transform: scaleX(1); }
        {% block styles %}{% endblock %}
    </style>
    <script src="/assets/js/slide-bridge.js"></script>
</head>
<body>
    <div class="slide">{% block content %}{% endblock %}</div>
    <footer class="footer-strip">
        <img class="club-logo" src="/assets/images/wcc-logo.png" alt="Wendover CC">
        <div class="club-meta">
            <span class="club-name">Wendover Cricket Club</span>
            <span class="club-watch">Watch anywhere · <strong>{{ site_url }}</strong></span>
        </div>
        <div class="sponsor-block">
            <span class="sponsor-heading">Please support our sponsors</span>
            <div class="sponsor-logos">
                {% for s in sponsors %}
                <img class="sponsor-logo" src="{{ s.src }}" alt="{{ s.name }}">
                {% endfor %}
            </div>
        </div>
    </footer>
</body>
</html>
