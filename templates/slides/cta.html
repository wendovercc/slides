<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ slide.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #1a3d1a;
            font-family: Georgia, 'Times New Roman', serif;
            color: #ffffff;
        }
        .slide {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            padding: 4rem 6rem 6rem;
        }
        .title {
            font-size: 4.5rem;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 2.5rem;
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
        .subtitle {
            font-size: 2rem;
            opacity: 0.75;
            margin-top: -1.5rem;
            margin-bottom: 2.5rem;
        }
        .lower {
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 4rem;
        }
        .body {
            flex: 1;
            font-size: 2.2rem;
            line-height: 1.6;
            opacity: 0.9;
        }
        .qr-panel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .qr-image {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1;
            background: #fff;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .qr-image img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .qr-label {
            text-align: center;
        }
        .scan-to {
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.75;
            margin-bottom: 0.4rem;
        }
        .cta-button {
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.75;
        }
        .branding {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.35);
            padding: 1rem 2rem;
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="title">{{ slide.title }}</div>
        {% if slide.subtitle is defined %}
        <div class="subtitle">{{ slide.subtitle }}</div>
        {% endif %}
        <div class="lower">
            <div class="body">{{ slide.body }}</div>
            <div class="qr-panel">
                <div class="qr-image">
                    <img src="{{ slide._qr_data_url }}" alt="QR code">
                </div>
                <div class="qr-label">
                    <div class="scan-to">Scan to</div>
                    <div class="cta-button">{{ slide.cta }}</div>
                </div>
            </div>
        </div>
    </div>
    <div class="branding">Wendover Cricket Club</div>
</body>
</html>
