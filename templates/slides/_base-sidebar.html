<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock %}</title>
    <style>
        /* WCC brand typeface — self-hosted Lato (OFL), offline-safe for the kiosk */
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 400; font-display: swap; src: url('/assets/fonts/lato-latin-400-normal.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: italic; font-weight: 400; font-display: swap; src: url('/assets/fonts/lato-latin-400-italic.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 700; font-display: swap; src: url('/assets/fonts/lato-latin-700-normal.woff2') format('woff2'); }
        @font-face { font-family: 'Lato'; font-style: normal; font-weight: 900; font-display: swap; src: url('/assets/fonts/lato-latin-900-normal.woff2') format('woff2'); }
        :root {
            /* WCC brand palette */
            --navy-1:       #0f2346;
            --navy-2:       #0a1c3a;
            --gold:         #d4af37;
            --light-blue:   #b4c8e4;
            --bg:           linear-gradient(165deg, var(--navy-1) 0%, var(--navy-2) 100%);
            --text:         #ffffff;
            --muted:        var(--light-blue);   /* secondary labels — prefer over opacity-white */
            --accent:       var(--gold);         /* single decorative accent: rules, headline metric, active tab */
            /* Result semantics (kept green/red/blue — these signal outcomes, not brand) */
            --accent-win:   #2d7a2d;
            --accent-loss:  #8b1a1a;
            --accent-amber: #7a5c00;
            --accent-draw:  #1a5c7a;
            --safe-x:       5vw;
            --safe-y:       5vh;
            --sidebar-w:    20vw;
            --t-xl:         4vw;
            --t-lg:         2.8vw;
            --t-md:         2vw;
            --t-sm:         1.2vw;
            --t-xs:         0.9vw;
            --t-xxs:        0.7vw;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        html, body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: var(--bg);
            font-family: 'Lato', -apple-system, Arial, sans-serif;
            color: var(--text);
        }
        .layout-sidebar {
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: row;
        }
        .slide-main {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: var(--safe-y) 2vw var(--safe-y) var(--safe-x);
        }
        .slide-sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--safe-y) var(--safe-x) var(--safe-y) 2vw;
            background: rgba(0,0,0,0.25);
            border-left: 1px solid rgba(255,255,255,0.08);
            gap: 2.5vh;
            overflow: hidden;
        }
        .club-logo {
            width: 65%;
            max-width: 10vw;
            height: auto;
            object-fit: contain;
        }
        .club-name {
            font-family: 'Lato', Arial, sans-serif;
            font-size: var(--t-xxs);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
        }
        .sidebar-divider {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .sponsor-logos-vert {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2vh;
            width: 100%;
        }
        .sponsor-logo-vert {
            width: 75%;
            max-width: 9vw;
            height: auto;
            max-height: 5.5vh;
            object-fit: contain;
            background: rgba(255,255,255,0.88);
            border-radius: 3px;
            padding: 2px 6px;
        }
        /* Carousel-style slides: breathing room between tab nav and table headers */
        .panel-nav { margin-bottom: 2.8vh; }
        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="layout-sidebar">
        <main class="slide-main">{% block content %}{% endblock %}</main>
        <aside class="slide-sidebar">
            <img class="club-logo" src="/assets/images/wcc-logo.png" alt="Wendover CC">
            <span class="club-name">Wendover Cricket Club</span>
            <div class="sidebar-divider"></div>
            <div class="sponsor-logos-vert">
                {% for s in sponsors %}
                <img class="sponsor-logo-vert" src="{{ s.src }}" alt="{{ s.name }}">
                {% endfor %}
            </div>
            {% block sidebar_extra %}{% endblock %}
        </aside>
    </div>
</body>
</html>
