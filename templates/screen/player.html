<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ location.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        iframe.active { opacity: 1; }

        body.preview iframe {
            width: 1920px; height: 1080px;
            left: auto; right: 0; top: 0;
            transform-origin: top right;
        }
        #dbg {
            display: none;
            position: fixed;
            left: 0; top: 0;
            width: 50%; height: 100%;
            overflow-y: auto;
            background: #0d0d0d;
            border-right: 1px solid #2a2a2a;
            font: 12px/1.6 monospace;
            color: #ccc;
        }
        body.preview #dbg { display: block; }

        .dbg-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            font-size: 11px;
            color: #fff;
            background: #161616;
            border-bottom: 1px solid #2a2a2a;
        }
        .dbg-meta span { color: #555; }
        .dbg-watch {
            color: #66bb6a;
            text-decoration: none;
            font-weight: bold;
            font-size: 11px;
            padding: 3px 10px;
            border: 1px solid #2a5a2a;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .dbg-watch:hover { background: #1b2e1b; }

        .dbg-row {
            display: flex;
            border-bottom: 1px solid #1e1e1e;
        }
        .dbg-row:last-child { border-bottom: none; }
        .dbg-ctx-col {
            flex: 0 0 44%;
            padding: 8px 12px;
            border-right: 1px solid #1e1e1e;
        }
        .dbg-slides-col {
            flex: 1;
            padding: 8px 10px;
        }

        .dbg-head {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 4px;
        }
        .dbg-head-live { color: #66bb6a; }
        .dbg-cd { color: #fff; font-weight: bold; }
        .dbg-live { color: #00e5ff; font-weight: bold; font-size: 14px; }
        .dbg-kv { display: flex; gap: 6px; }
        .dbg-k { color: #555; width: 8ch; flex-shrink: 0; }
        .dbg-v { color: #ddd; }
        .dbg-dim { color: #444; font-size: 11px; }

        .dbg-slide { display: flex; justify-content: space-between; color: #fff; padding: 0 3px; margin: 0 -3px; border-radius: 2px; }
        .dbg-slide-dur { color: #444; font-size: 11px; margin-left: 6px; flex-shrink: 0; }
        .dbg-slide a { color: inherit; text-decoration: none; }
        .dbg-slide a:hover { text-decoration: underline; }
        #dbg-row-current .dbg-slide { color: #66bb6a; }
        #dbg-row-current .dbg-slide.now { background: #1b2e1b; color: #a5d6a7; }
        .dbg-none { color: #333; }

        #about {
            display: none;
            position: fixed;
            right: 0; bottom: 0;
            width: 50%; height: 50%;
            background: #0d0d0d;
            border-top: 1px solid #2a2a2a;
            font: 12px/1.6 monospace;
            color: #ccc;
            padding: 20px 24px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 10px;
        }
        body.preview #about { display: flex; }
        .about-title { font-size: 15px; color: #fff; font-weight: bold; margin-bottom: 4px; }
        .about-body { display: flex; gap: 24px; align-items: flex-start; flex: 1; }
        .about-links { display: flex; flex-direction: column; gap: 4px; }
        .about-label { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
        .about-label:first-child { margin-top: 0; }
        .about-val { color: #ddd; }
        .about-val a { color: #00e5ff; text-decoration: none; }
        .about-val a:hover { text-decoration: underline; }
        .about-qr { margin-left: auto; flex-shrink: 0; }
        .about-qr img { display: block; border-radius: 4px; }
        .about-footer { color: #444; font-size: 11px; margin-top: auto; }

        #iframe-overlay {
            display: none;
            position: fixed;
            right: 0; top: 0;
            width: 50%;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            z-index: 10;
        }
        #iframe-overlay:hover::after {
            content: '⛶  Open current slide';
            position: absolute;
            bottom: 10px; right: 12px;
            font: 11px/1 monospace;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 3px;
            pointer-events: none;
        }
        body.preview #iframe-overlay { display: block; }
    </style>
</head>
<body>
<div id="dbg"></div>
<div id="iframe-overlay" onclick="openCurrentSlide()"></div>
<div id="about">
    <div class="about-title">{{ preview.title }}</div>
    <div class="about-body">
        <div class="about-links">
            <div class="about-label">Watch anywhere at</div>
            <div class="about-val"><a href="{{ preview.site_url }}" target="_blank">{{ preview.site_url }}</a></div>
            <div class="about-label">Documentation &amp; code</div>
            <div class="about-val"><a href="{{ preview.github_url }}" target="_blank">{{ preview.github_url }}</a></div>
            <div class="about-label">Support / feature request</div>
            <div class="about-val"><a href="mailto:{{ preview.support_email }}">{{ preview.support_email }}</a></div>
        </div>
        <div class="about-qr">
            <img src="{{ qr_data_url }}" width="120" height="120" alt="QR code">
        </div>
    </div>
    <div class="about-footer">Built {{ built_at }} &nbsp;·&nbsp; <span id="about-reload"></span></div>
</div>
<script>
const LOCATION_ID = {{ location.id | tojson }};
const PREVIEW = new URLSearchParams(window.location.search).has('preview');
let _currentSlug = null;
function openCurrentSlide() { if (_currentSlug) window.open(`/slide/${_currentSlug}/`, '_blank'); }
if (PREVIEW) document.body.classList.add('preview');

function applyDebugScale() {
    if (!PREVIEW) return;
    const scale = (window.innerWidth * 0.5) / 1920;
    document.querySelectorAll('iframe').forEach(f => f.style.transform = `scale(${scale})`);
}
window.addEventListener('resize', applyDebugScale);

function parsePhaseTime(dateStr, timeStr) {
    if (timeStr === '24:00') {
        const d = new Date(`${dateStr}T00:00:00`);
        d.setDate(d.getDate() + 1);
        return d;
    }
    return new Date(`${dateStr}T${timeStr}:00`);
}

function resolveContext(calendar, loc) {
    const today = new Date().toISOString().slice(0, 10);
    const timeNow = new Date().toTimeString().slice(0, 5);
    const entries = calendar.entries?.[loc.id]?.dates?.[today] ?? [];

    for (const entry of entries) {
        for (const [phase, win] of Object.entries(entry.phases)) {
            if (timeNow >= win.start && timeNow < win.end) {
                return {
                    context: { type: entry.type, phase, audience: entry.audience, detail: entry.detail },
                    slideshowSlug: entry.slideshow ?? loc.slideshow,
                    contextStart: win.start,
                    contextEnd: parsePhaseTime(today, win.end),
                };
            }
        }
    }
    return {
        context: { type: 'idle', phase: null, audience: loc.default_context ?? { section: 'all' }, detail: {} },
        slideshowSlug: loc.slideshow,
        contextEnd: null,
    };
}

function matchesContext(s, ctx) {
    const conds = s.show_when;
    if (!conds || conds.length === 0) return true;
    return conds.some(c => {
        if (c.type    && !c.type.includes(ctx.type))                 return false;
        if (c.phase   && !c.phase.includes(ctx.phase))               return false;
        if (c.section && !c.section.includes(ctx.audience?.section)) return false;
        if (c.teams) {
            const ct = ctx.audience?.teams ?? [];
            if (!c.teams.some(t => ct.includes(t)))                  return false;
        }
        return true;
    });
}

function slidesForCtx(show, ctx, today) {
    return show.slides
        .filter(s => s.slide_active !== false)
        .filter(s => !s.slide_expires || s.slide_expires >= today)
        .filter(s => !s.expires       || s.expires       >= today)
        .filter(s => matchesContext(s, ctx));
}

function ctxFromNext(nc, loc) {
    if (nc.type === 'idle') {
        return { type: 'idle', phase: null, audience: loc.default_context ?? { section: 'all' }, detail: {} };
    }
    return { type: nc.type, phase: nc.phase, audience: nc.entry.audience, detail: nc.entry.detail };
}

function findNextContexts(calendar, locId) {
    const now = new Date();
    const today = now.toISOString().slice(0, 10);
    const timeNow = now.toTimeString().slice(0, 5);
    const cutoff = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
    const locDates = calendar.entries?.[locId]?.dates ?? {};

    const upcoming = [];
    for (const dateStr of Object.keys(locDates).sort()) {
        if (dateStr < today || dateStr > cutoff) continue;
        for (const entry of locDates[dateStr]) {
            for (const phase of ['warm_up', 'main', 'wind_down']) {
                const win = entry.phases?.[phase];
                if (!win) continue;
                if (dateStr === today && win.start <= timeNow) continue;
                upcoming.push({
                    type: entry.type, phase, entry, dateStr,
                    start: parsePhaseTime(dateStr, win.start),
                    end:   parsePhaseTime(dateStr, win.end),
                });
            }
        }
    }
    upcoming.sort((a, b) => a.start - b.start);

    const results = [];
    for (let i = 0; i < upcoming.length; i++) {
        const prev = upcoming[i - 1];
        const cur  = upcoming[i];
        if (prev && cur.start > prev.end) {
            results.push({ type: 'idle', start: prev.end, end: cur.start });
        }
        results.push(cur);
    }
    return results;
}

function fmtDuration(ms) {
    const totalMins = Math.ceil(ms / 60000);
    const h = Math.floor(totalMins / 60), m = totalMins % 60;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
}

function fmtCountdown(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(sec).padStart(2,'0')}s`;
    return `${m}m ${String(sec).padStart(2,'0')}s`;
}

function kv(k, v) {
    return `<div class="dbg-kv"><span class="dbg-k">${k}</span><span class="dbg-v">${v}</span></div>`;
}

function renderCtxCol(ctx, label, cdMs) {
    const aud = ctx.audience ?? {};
    const rows = [
        `<div class="dbg-head${label === 'Live' ? ' dbg-head-live' : ''}">${label}</div>`,
        kv('type',    ctx.type + (ctx.phase ? ` · ${ctx.phase}` : '')),
        kv('section', aud.section ?? '—'),
    ];
    if (aud.teams?.length) rows.push(kv('teams', aud.teams.join(', ')));
    if (ctx._timeStr)     rows.push(kv('at',       ctx._timeStr));
    if (cdMs != null)     rows.push(kv('duration', `<span class="dbg-cd dbg-live" data-start="${cdMs}"></span>`));
    if (ctx._durationStr) rows.push(kv('duration', ctx._durationStr));
    return rows.join('');
}

function renderSlidesCol(slides, label) {
    const head = `<div class="dbg-head">${label} (${slides.length})</div>`;
    if (!slides.length) return head + `<div class="dbg-none">—</div>`;
    return head + slides.map(s =>
        `<div class="dbg-slide" data-slug="${s.slug}"><span>● <a href="/slide/${s.slug}/" target="_blank">${s.slug}</a></span><span class="dbg-slide-dur">${s.duration}s</span></div>`
    ).join('');
}

function renderPanel(loc, ctx, slideshowSlug, show, nextCtxs, today, contextEnd) {
    const panel = document.getElementById('dbg');
    if (!panel) return;

    const currentSlides = slidesForCtx(show, ctx, today);

    let html = `<div class="dbg-meta"><span>Preview of slides for screen <strong>${loc.name}</strong> <span>· ${slideshowSlug ?? '—'}</span></span><a class="dbg-watch" href="${window.location.pathname}" target="_blank">Watch</a></div>`;

    // Current context row — countdown shows time remaining in this phase
    html += `<div class="dbg-row" id="dbg-row-current">
        <div class="dbg-ctx-col">${renderCtxCol(ctx, 'Live', contextEnd?.getTime() ?? null)}</div>
        <div class="dbg-slides-col">${renderSlidesCol(currentSlides, 'Slides')}</div>
    </div>`;

    // Next context rows — show start time + static duration
    nextCtxs.forEach((nc, i) => {
        const ncCtx = ctxFromNext(nc, loc);
        const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        if (nc.type !== 'idle') {
            const dow = DAYS[new Date(`${nc.dateStr}T12:00:00`).getDay()];
            ncCtx._timeStr     = `${dow} ${nc.dateStr} ${nc.entry.phases[nc.phase].start}`;
        } else {
            const dow = DAYS[nc.start.getDay()];
            const dateStr = nc.start.toISOString().slice(0, 10);
            ncCtx._timeStr     = `${dow} ${dateStr} ${nc.start.toTimeString().slice(0, 5)}`;
        }
        ncCtx._durationStr = nc.end ? fmtDuration(nc.end - nc.start) : '—';
        const ncSlides = slidesForCtx(show, ncCtx, today);
        html += `<div class="dbg-row">
            <div class="dbg-ctx-col">${renderCtxCol(ncCtx, `Next ${i + 1}`)}</div>
            <div class="dbg-slides-col">${renderSlidesCol(ncSlides, 'Slides')}</div>
        </div>`;
    });

    panel.innerHTML = html;

    const tick = () => {
        document.querySelectorAll('.dbg-cd').forEach(el => {
            el.textContent = fmtCountdown(el.dataset.start - new Date());
        });
    };
    tick();
    setInterval(tick, 1000);
}

function markCurrentSlide(shownSlides, currentIdx) {
    const slug = shownSlides[currentIdx]?.slug;
    document.querySelectorAll('#dbg-row-current .dbg-slide').forEach(el => {
        el.classList.toggle('now', el.dataset.slug === slug);
    });
}

async function init() {
    const today = new Date().toISOString().slice(0, 10);

    const [calendar, locationsData] = await Promise.all([
        fetch('/context_calendar.json').then(r => r.json()),
        fetch('/locations.json').then(r => r.json()),
    ]);

    const loc = locationsData.locations.find(l => l.id === LOCATION_ID);
    if (!loc) return;

    const { context, slideshowSlug, contextStart, contextEnd } = resolveContext(calendar, loc);
    if (!slideshowSlug) return;

    if (contextStart) {
        const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const dow = DAYS[new Date(`${today}T12:00:00`).getDay()];
        context._timeStr = `${dow} ${today} ${contextStart}`;
    }

    const show = await fetch(`/slideshow/${slideshowSlug}/data.json`).then(r => r.json());
    const slides = slidesForCtx(show, context, today);

    if (PREVIEW) {
        const nextCtxs = findNextContexts(calendar, LOCATION_ID);
        renderPanel(loc, context, slideshowSlug, show, nextCtxs, today, contextEnd);
    }

    if (slides.length === 0) return;

    slides.forEach(s => {
        const f = document.createElement('iframe');
        f.src = `/slide/${s.slug}/`;
        document.body.appendChild(f);
    });
    applyDebugScale();

    const frames = document.querySelectorAll('iframe');
    let current = 0;
    let timer = null;

    function showSlide(i) {
        frames.forEach((f, j) => f.classList.toggle('active', j === i));
        _currentSlug = slides[i].slug;
        if (PREVIEW) markCurrentSlide(slides, i);
    }

    function schedule() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(advance, slides[current].duration * 1000);
    }

    function advance() {
        current = (current + 1) % slides.length;
        showSlide(current);
        schedule();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') {
            current = (current + 1) % slides.length;
            showSlide(current);
            schedule();
        } else if (e.key === 'ArrowLeft') {
            current = (current - 1 + slides.length) % slides.length;
            showSlide(current);
            schedule();
        }
    });

    showSlide(0);
    schedule();

    const reloadMs = show.refresh_interval_seconds * 1000;
    setTimeout(() => window.location.reload(), reloadMs);

    if (PREVIEW) {
        const reloadEl = document.getElementById('about-reload');
        const reloadAt = Date.now() + reloadMs;
        const tickReload = () => {
            const ms = reloadAt - Date.now();
            if (ms > 0 && reloadEl) {
                reloadEl.textContent = `reloads in ${fmtCountdown(ms)}`;
                setTimeout(tickReload, 1000);
            }
        };
        tickReload();
    }
}

init();
</script>
</body>
</html>
